# ──────────────────────────────────────────────────────────────────────────
# AutoVoiceEvals Configuration
# ──────────────────────────────────────────────────────────────────────────

# Vapi assistant to test
assistant:
  id: "your-vapi-assistant-id"
  name: "Your Agent Name"
  description: |
    Describe what your voice agent does, its business context,
    services, hours, location, etc. This description is used by
    Claude to generate relevant adversarial test scenarios.

# Original pipeline settings (for python run.py)
run:
  attack_rounds: 2          # Rounds of adversarial testing before improvement
  verify_rounds: 2          # Rounds of verification after improvement
  scenarios_per_round: 5    # Scenarios generated per round
  top_k_elites: 2           # Elite scenarios kept for mutation each round
  max_turns_per_conversation: 12

# Autoresearch settings (for python autoresearch.py)
autoresearch:
  eval_scenarios: 8         # Fixed adversarial eval suite size
  improvement_threshold: 0.005  # Min score delta to count as improvement
  max_experiments: 0        # 0 = run forever, N = stop after N experiments

# LLM settings
llm:
  model: "claude-sonnet-4-20250514"
  max_retries: 5
  timeout_seconds: 120

# Output
output:
  dir: "results"
  save_transcripts: true
  generate_graphs: true
